name: Build Reciter TTS APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      onnx_version:
        description: 'ONNX Runtime version'
        required: true
        default: '1.26.0'
        type: string

permissions:
  contents: write   # needed to publish the APK to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # v3 dropped the api-level/build-tools inputs; pass explicit packages
          # instead. Listing them here also avoids the action falling back to the
          # deprecated "tools" package, whose emulator download fails ("unknown
          # archive") and broke the build.
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar missing, downloading..."
            mkdir -p gradle/wrapper
            wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar ||             curl -sL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew
          ls -la gradlew
          ls -la gradle/wrapper/

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          SHERPA_VER=1.13.3
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${SHERPA_VER}/sherpa-onnx-static-link-onnxruntime-${SHERPA_VER}.aar"
          echo "Downloading $URL"
          curl -fL --retry 4 --retry-delay 3 -o app/libs/sherpa-onnx.aar "$URL"
          ls -la app/libs/

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ] || [ -z "${{ github.event.inputs.build_type }}" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx8192m -XX:MaxMetaspaceSize=512m

      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: reciter-tts-debug
          # APK is renamed to reciter-tts-v<version>-debug.apk, so glob it.
          path: app/build/outputs/apk/debug/*.apk
          # Short retention so accumulated artifacts don't exhaust the free
          # Actions storage quota (which silently drops new artifacts).
          retention-days: 3

      # Primary delivery: publish the debug APK to a rolling "latest" release.
      # Artifacts can vanish when the storage quota is hit; a release asset is a
      # stable, always-downloadable link and a single rolling tag stays small.
      - name: Publish debug APK to "latest" release
        if: github.ref == 'refs/heads/main' && (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug APK
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: reciter-tts-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: reciter-tts-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          prerelease: false

  build-signed:
    runs-on: ubuntu-latest
    if: false # Disabled for now
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            mkdir -p gradle/wrapper
            wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar ||             curl -sL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Signed APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx8192m -XX:MaxMetaspaceSize=512m

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-tts-signed
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
